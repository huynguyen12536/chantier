name: CI/CD Pipeline

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-code:
    name: Stage 1 - Check Code
    runs-on: self-hosted
    environment: develop
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bypass lint check
        run: |
          echo "Lint check bypassed."

  build-and-push:
    name: Stage 2 - Build and Push Image
    runs-on: self-hosted
    needs: check-code
    environment: develop
    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag from git tag
        id: set_tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ secrets.IMAGE_NAME }}:${{ steps.set_tag.outputs.tag }}
            ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ secrets.IMAGE_NAME }}:latest
          build-args: |
            EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
            EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

  deploy:
    name: Stage 3 - Deploy to Server
    runs-on: self-hosted
    needs: build-and-push
    environment: develop
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e

            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            REPO_DIR="/home/dfm/chantier/Chantier-web-app"
            REPO_URL="https://x-access-token:${{ secrets.DEPLOY_KEY }}@github.com/DFM-EUROPE/Chantier-web-app.git"

            echo "=== Preparing repo ==="
            mkdir -p /home/dfm/chantier

            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch origin --tags --force
            git checkout -f "tags/$IMAGE_TAG"

            echo "=== Login to Harbor ==="
            echo '${{ secrets.HARBOR_PASSWORD }}' | docker login '${{ secrets.HARBOR_REGISTRY }}' -u '${{ secrets.HARBOR_USERNAME }}' --password-stdin

            echo "=== Pulling image ==="
            docker pull ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ secrets.IMAGE_NAME }}:$IMAGE_TAG

            echo "=== Restarting services ==="
            docker compose down || true

            IMAGE_TAG=$IMAGE_TAG \
            HARBOR_REGISTRY=${{ secrets.HARBOR_REGISTRY }} \
            HARBOR_PROJECT=${{ secrets.HARBOR_PROJECT }} \
            IMAGE_NAME=${{ secrets.IMAGE_NAME }} \
            EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }} \
            EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }} \
            WEB_PORT=${{ secrets.WEB_PORT }} \
            docker compose up -d

            echo "=== Done: $IMAGE_TAG ==="
